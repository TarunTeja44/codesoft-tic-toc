<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe Minimax</title>
  <style>
    :root {
      --bg1: #f7efe3;
      --bg2: #e7f0f2;
      --card: #ffffff;
      --ink: #1f2a37;
      --muted: #4b5563;
      --accent: #0f766e;
      --accent-2: #b45309;
      --line: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, var(--bg1), transparent 55%),
                  radial-gradient(circle at 80% 80%, var(--bg2), transparent 60%),
                  #f9fafb;
      padding: 16px;
    }

    .card {
      width: min(92vw, 420px);
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 14px 28px rgba(17, 24, 39, 0.12);
      animation: fadeIn 360ms ease-out;
    }

    .title {
      margin: 0 0 8px;
      font-size: 1.35rem;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .status {
      margin: 0 0 14px;
      font-weight: 700;
      text-align: center;
      min-height: 1.5em;
      color: var(--accent);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 2px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-size: clamp(1.9rem, 5vw, 2.4rem);
      font-weight: 800;
      color: var(--ink);
      cursor: pointer;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #f8fafc;
    }

    .cell:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .cell.x {
      color: var(--accent-2);
    }

    .cell.o {
      color: var(--accent);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .btn {
      border: 0;
      border-radius: 9px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--ink);
      color: #fff;
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Tic-Tac-Toe</h1>
    <p class="sub">You are X. AI is O</p>
    <p class="status" id="status">Your turn (X)</p>

    <section class="board" id="board" aria-label="Tic-Tac-Toe board"></section>

    <div class="actions">
      <button class="btn" id="restartBtn">Restart Game</button>
      <button class="btn secondary" id="newAIBtn">AI Starts</button>
    </div>

    <div class="actions" style="margin-top: 8px;">
      <button class="btn" id="modeAIBtn">Player vs AI</button>
      <button class="btn secondary" id="modePVPBtn">Player vs Player</button>
    </div>
  </main>

  <script>
    const HUMAN = "X";
    const AI = "O";

    let board = Array(9).fill(" ");
    let gameOver = false;
    let gameMode = "ai";
    let currentPlayer = HUMAN;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");
    const newAIBtn = document.getElementById("newAIBtn");
    const modeAIBtn = document.getElementById("modeAIBtn");
    const modePVPBtn = document.getElementById("modePVPBtn");

    function checkWinner(state, player) {
      const lines = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
      ];
      return lines.some(([a, b, c]) => state[a] === player && state[b] === player && state[c] === player);
    }

    function isDraw(state) {
      return !state.includes(" ") && !checkWinner(state, HUMAN) && !checkWinner(state, AI);
    }

    function availableMoves(state) {
      return state.map((v, i) => (v === " " ? i : -1)).filter(i => i !== -1);
    }

    function minimax(state, isMaximizing) {
      if (checkWinner(state, AI)) return 1;
      if (checkWinner(state, HUMAN)) return -1;
      if (isDraw(state)) return 0;

      if (isMaximizing) {
        let best = -Infinity;
        for (const move of availableMoves(state)) {
          state[move] = AI;
          const score = minimax(state, false);
          state[move] = " ";
          best = Math.max(best, score);
        }
        return best;
      }

      let best = Infinity;
      for (const move of availableMoves(state)) {
        state[move] = HUMAN;
        const score = minimax(state, true);
        state[move] = " ";
        best = Math.min(best, score);
      }
      return best;
    }

    function getBestAIMove(state) {
      let bestScore = -Infinity;
      let bestMove = null;

      for (const move of availableMoves(state)) {
        state[move] = AI;
        const score = minimax(state, false);
        state[move] = " ";

        if (score > bestScore) {
          bestScore = score;
          bestMove = move;
        }
      }

      return bestMove;
    }

    function updateStatus(text, color = "var(--accent)") {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      board.forEach((value, index) => {
        const btn = document.createElement("button");
        btn.className = "cell";
        btn.textContent = value === " " ? "" : value;
        if (value === HUMAN) btn.classList.add("x");
        if (value === AI) btn.classList.add("o");
        btn.disabled = gameOver || value !== " ";
        btn.addEventListener("click", () => handleCellClick(index));
        boardEl.appendChild(btn);
      });
    }

    function finishIfEnded() {
      if (checkWinner(board, HUMAN)) {
        gameOver = true;
        updateStatus(gameMode === "pvp" ? "Player X wins!" : "You win!", "#b45309");
        renderBoard();
        return true;
      }

      if (checkWinner(board, AI)) {
        gameOver = true;
        updateStatus(gameMode === "pvp" ? "Player O wins!" : "AI wins!", "#0f766e");
        renderBoard();
        return true;
      }

      if (isDraw(board)) {
        gameOver = true;
        updateStatus("It is a draw.", "#374151");
        renderBoard();
        return true;
      }

      return false;
    }

    function handleCellClick(index) {
      if (gameOver || board[index] !== " ") return;

      board[index] = currentPlayer;
      renderBoard();

      if (finishIfEnded()) return;

      if (gameMode === "pvp") {
        currentPlayer = currentPlayer === HUMAN ? AI : HUMAN;
        updateStatus(`Player ${currentPlayer}'s turn`);
        return;
      }

      updateStatus("AI is thinking...");
      disableBoard();
      window.setTimeout(handleAIMove, 320);
    }

    function disableBoard() {
      boardEl.querySelectorAll(".cell").forEach(btn => {
        btn.disabled = true;
      });
    }

    function handleAIMove() {
      if (gameOver) return;
      const move = getBestAIMove(board);
      if (move !== null) {
        board[move] = AI;
      }
      currentPlayer = HUMAN;
      renderBoard();

      if (finishIfEnded()) return;

      updateStatus("Your turn (X)");
    }

    function restart(humanStarts = true) {
      board = Array(9).fill(" ");
      gameOver = false;
      currentPlayer = HUMAN;
      renderBoard();

      if (gameMode === "pvp") {
        updateStatus("Player X's turn");
        return;
      }

      if (humanStarts) {
        updateStatus("Your turn (X)");
      } else {
        currentPlayer = AI;
        updateStatus("AI is thinking...");
        disableBoard();
        window.setTimeout(handleAIMove, 320);
      }
    }

    function setMode(mode) {
      gameMode = mode;
      if (mode === "ai") {
        modeAIBtn.classList.remove("secondary");
        modePVPBtn.classList.add("secondary");
        updateStatus("Your turn (X)");
        restart(true);
      } else {
        modeAIBtn.classList.add("secondary");
        modePVPBtn.classList.remove("secondary");
        restart(true);
      }
    }

    restartBtn.addEventListener("click", () => restart(true));
    newAIBtn.addEventListener("click", () => {
      if (gameMode === "pvp") {
        updateStatus("AI Starts works only in Player vs AI mode", "#374151");
        return;
      }
      restart(false);
    });
    modeAIBtn.addEventListener("click", () => setMode("ai"));
    modePVPBtn.addEventListener("click", () => setMode("pvp"));

    setMode("ai");
  </script>
</body>
</html>
